<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <title> Bird Gallery</title>
<style>
    .gallery {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
    }
body{
    font-family:Arial;
    text-align:center;
    background-color: aquamarine;
}
h1{
    margin:20px;
}
.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content: center;
    gap:15px;
}
.gallery img{
    width:250px;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}
.gallery > div {
    display: flex;
    flex-direction: column;
    align-items: center;
}
.gallery {
    max-width: 800px;
    margin: auto;
}
body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: rgb(189, 215, 206);
    text-align: center;
}
.title {
    text-align: center;
    padding: 20px;
    color: #2e4d3d;
}
.gallery {
    width: 100%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding-bottom: 40px;
}
.card {
    background: white;
    border-radius: 80px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}
.card:hover {
    transform: scale(1.05);
}
.card img {
    width: 800px;
    height: 400px;
    object-fit: cover;
}
.card h3 {
    text-align: center;
    padding: 100px;
}
</style>
</head>
<body>
    <h1 class="="title">Explore All About Birds Species</h1>

    <div class="gallery">
        <div class="card">
    <img src="sparrow.jpg"Bird 1"><br><br>

    </div>

    </div>

    <div class="card">
    <img src="img2.jpg"alt="Bird 3"><br><br>
    <h2>Kingfisher</h2>
    </div>

     <div class="card">
    <img src="img1.jpg"alt=Bird 4"><br><br>
    <h2>Parrot</h2>
    </div>

    <div class="card">
    <img src="img3.jpg"alt=Bird 5"><br><br>
    <h2>Swan</h2>
    </div>

    <div class="card">
    <img src="https://media.istockphoto.com/id/1416625262/photo/little-girl-running-towards-a-flock-of-pigeons-in-the-park.jpg?s=612x612&w=0&k=20&c=p0FGg-yo1RC6RsnJn1ixqJuSr_LqZogOVbldQsebIyM="alt=Bird 6"><br><br>
    <h2>Flock of Birds</h2>
    </div>

    <h2>Warm Nest Moments</h2>

 <div class="card">

<div class="card">

</html>
