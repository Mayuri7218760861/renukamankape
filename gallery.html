}
.gallery{

}

}
body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}
.title {
    text-align: center;
    padding: 20px;
    color: #2e4d3d;
}
.gallery {
    width: 90%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding-bottom: 40px;
}
.card {
    background: white;
    border-radius: 80px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}
.card:hover {
    transform: scale(1.05);
}
.card img {
    width: 100px;
    height: 200px;
    object-fit: cover;
}
.card h3 {
    text-align: center;
    padding: 10px;
}
